name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          VERSION=$(curl -s https://api.github.com/repos/railwayapp/cli/releases/latest | grep tag_name | cut -d'"' -f4)
          curl -L "https://github.com/railwayapp/cli/releases/download/$VERSION/railway-$VERSION-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/railway.tar.gz
          sudo tar -xzf /tmp/railway.tar.gz -C /usr/local/bin railway

      - name: Link and Deploy
        run: |
          railway link --project celebrated-empathy --service pizzaria-bot
          railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
